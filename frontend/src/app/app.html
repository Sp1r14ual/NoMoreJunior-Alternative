<div class="app-shell">
  <div class="layout" [class.auth-locked]="!authService.isAuthenticated()">
    <aside class="sidebar">
      <div class="brand">NoMoreJunior</div>

      <nav class="menu">
        <a class="item" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Мой профиль</a>
        <a class="item" routerLink="/tests" routerLinkActive="active">Тесты</a>
        <a class="item" routerLink="/tasks" routerLinkActive="active">Задания</a>
      </nav>

      <div class="sidebar-bottom">
        <a class="item" href="https://vk.com/id462903977" target="_blank">Поддержка</a>
        <a class="item" href="#">Мой аккаунт</a>

        @if (authService.isAuthenticated()) {
          <button class="item logout-item" type="button" (click)="logout()">Выход</button>
        }
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <nav class="crumbs" aria-label="Breadcrumb">
          <a routerLink="/">Домашняя страница</a>

          @if (breadcrumb()) {
            <span class="current">{{ breadcrumb() }}</span>
          }
        </nav>

        <div class="top-actions">
          <button class="btn">PDF</button>
        </div>
      </header>

      <div class="page-body">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  @if (!authService.isAuthenticated()) {
    <div class="auth-overlay">
      <div class="auth-backdrop"></div>
      <div class="auth-modal">
        <app-login></app-login>
      </div>
    </div>
  }
</div>
